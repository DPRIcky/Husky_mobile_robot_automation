a300_00000:
  clearpath_diagnostic_updater:
    ros__parameters:
      serial_number: 'a300-00000'
      platform_model: 'a300'
      ros_distro: 'jazzy'
      latest_apt_firmware_version: 'simulated'
      installed_apt_firmware_version: 'simulated'
      use_sim_time: True
      bms_state_rate: 2.5
      bms_state_tolerance: 0.2
      topics.sensors/lidar2d_0/scan.type: 'sensor_msgs/msg/LaserScan'
      topics.sensors/lidar2d_0/scan.rate: 40.0
      topics.sensors/camera_0/color/image.type: 'sensor_msgs/msg/Image'
      topics.sensors/camera_0/color/image.rate: 30.0
      topics.sensors/camera_0/depth/image.type: 'sensor_msgs/msg/Image'
      topics.sensors/camera_0/depth/image.rate: 30.0
      topics.sensors/camera_0/points.type: 'sensor_msgs/msg/PointCloud2'
      topics.sensors/camera_0/points.rate: 30.0
      topics.sensors/imu_0/data.type: 'sensor_msgs/msg/Imu'
      topics.sensors/imu_0/data.rate: 100.0
      topics.sensors/imu_0/mag.type: 'sensor_msgs/msg/MagneticField'
      topics.sensors/imu_0/mag.rate: 0.0
      topics.sensors/gps_0/fix.type: 'sensor_msgs/msg/NavSatFix'
      topics.sensors/gps_0/fix.rate: 5.0
